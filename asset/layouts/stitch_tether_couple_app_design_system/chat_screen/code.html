<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tether | Real-time Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6eddf; /* surface-container */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chat-container {
            height: calc(100vh - 150px);
            scrollbar-width: none;
        }
        .chat-container::-webkit-scrollbar {
            display: none;
        }
        .message-bubble-me {
            border-bottom-right-radius: 4px !important;
        }
        .message-bubble-partner {
            border-bottom-left-radius: 4px !important;
        }
        /* Custom scroll behavior for the messages */
        .scroll-smooth-container {
            scroll-behavior: smooth;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d6e7db",
                        "surface-container-highest": "#eae1d4",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#1c1c18",
                        "on-secondary-container": "#57665d",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#c9c6c0",
                        "surface-tint": "#37684d",
                        "primary-container": "#4a7b5f",
                        "outline": "#717972",
                        "on-secondary-fixed-variant": "#3b4a41",
                        "surface-dim": "#e2d9cc",
                        "on-primary-container": "#dcffe7",
                        "inverse-on-surface": "#f9efe2",
                        "error-container": "#ffdad6",
                        "secondary-container": "#d3e4d8",
                        "background": "#fff8f2",
                        "error": "#ba1a1a",
                        "surface-container": "#f6eddf",
                        "on-secondary-fixed": "#101e17",
                        "on-tertiary-container": "#f9f6ef",
                        "surface-variant": "#eae1d4",
                        "on-primary": "#ffffff",
                        "secondary": "#526259",
                        "surface": "#fff8f2",
                        "secondary-fixed-dim": "#bacbbf",
                        "tertiary-fixed": "#e5e2db",
                        "surface-bright": "#fff8f2",
                        "tertiary-container": "#72716b",
                        "outline-variant": "#c0c9c1",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1f1b13",
                        "on-surface-variant": "#414943",
                        "primary-fixed": "#b9efcd",
                        "surface-container-high": "#f0e7da",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1f1b13",
                        "inverse-primary": "#9ed2b1",
                        "primary": "#316248",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#9ed2b1",
                        "surface-container-low": "#fcf2e5",
                        "on-primary-fixed": "#002112",
                        "on-primary-fixed-variant": "#1e5037",
                        "inverse-surface": "#343027",
                        "on-tertiary-fixed-variant": "#474742",
                        "tertiary": "#595953"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "xs": "4px",
                        "lg": "24px",
                        "xxl": "48px",
                        "margin-mobile": "20px",
                        "sm": "8px",
                        "margin-desktop": "40px",
                        "md": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface">
<!-- Top Navigation Bar -->
<header class="w-full top-0 sticky z-50 bg-surface/80 backdrop-blur-md flex justify-between items-center px-margin-mobile py-sm transition-colors duration-200">
<div class="flex items-center gap-md">
<button class="hover:bg-surface-container rounded-full p-xs transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex items-center gap-sm">
<div class="relative w-10 h-10 rounded-full overflow-hidden">
<img alt="Partner" class="w-full h-full object-cover" data-alt="A close-up portrait of a serene woman with a gentle smile, illuminated by soft morning sunlight in a warm domestic setting. The aesthetic is clean and minimalist, following a nature-inspired sage and cream color palette. The mood is intimate and peaceful, perfectly capturing a sense of connection for a private relationship sanctuary app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDO2SW_VAcExF3nuAsAhwpSOdV5sqCmppbguSOinAOnZRN8C5Xmr5_1LtcIQJB2FHFdlsjpytSC2zTkaHOOnPEZD3MrZ0SxXc9RabKhMl1mjYhxjmNt0MDqCrE5ksY8C7p3JsndeOJoyMOzPw2iNEm8Z9R2RqIzjmdSw3vzySP1EKFGfEZkOL4H3aHw-lFYihsU4ywO8dpS_ORt7m4xtOnsHDDhqK02_5R51xnBCFzCBE9xa0RfHjaEhDMgWV9oDZvACg9P6ojHhI18"/>
<span class="absolute bottom-0 right-0 w-3 h-3 bg-[#4CAF50] border-2 border-surface rounded-full"></span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-body-md font-semibold text-primary">Sarah</span>
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">Active now</span>
</div>
</div>
</div>
<div class="flex items-center gap-md">
<button class="hover:bg-surface-container rounded-full p-xs text-primary transition-colors">
<span class="material-symbols-outlined">videocam</span>
</button>
<button class="hover:bg-surface-container rounded-full p-xs text-primary transition-colors">
<span class="material-symbols-outlined">call</span>
</button>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="chat-container overflow-y-auto px-margin-mobile py-lg flex flex-col gap-lg">
<!-- Date Divider -->
<div class="flex justify-center my-md">
<span class="bg-surface-container-highest px-md py-xs rounded-full text-label-sm text-on-surface-variant">어제</span>
</div>
<!-- Partner Message Group -->
<div class="flex flex-col gap-xs max-w-[80%] items-start">
<div class="bg-surface-container-low text-on-surface p-md rounded-[18px] message-bubble-partner shadow-sm transition-all duration-300">
<p class="font-body-md text-body-md">Good morning! Did you sleep well?</p>
</div>
<div class="bg-surface-container-low text-on-surface p-md rounded-[18px] message-bubble-partner shadow-sm transition-all duration-300">
<p class="font-body-md text-body-md">I was thinking we could try that new cafe this weekend. ☕️</p>
</div>
<span class="text-[10px] text-on-surface-variant ml-sm mt-xs">08:42 AM</span>
</div>
<!-- My Message Group -->
<div class="flex flex-col gap-xs max-w-[80%] items-end self-end">
<div class="bg-primary-container text-on-primary-container p-md rounded-[18px] message-bubble-me shadow-sm transition-all duration-300">
<p class="font-body-md text-body-md">Hey! I slept great, dreaming of us. ❤️</p>
</div>
<div class="bg-primary-container text-on-primary-container p-md rounded-[18px] message-bubble-me shadow-sm transition-all duration-300">
<p class="font-body-md text-body-md">I'd love to try that place! Saturday works best for me.</p>
</div>
<span class="text-[10px] text-on-surface-variant mr-sm mt-xs">09:15 AM</span>
</div>
<!-- Date Divider -->
<div class="flex justify-center my-md">
<span class="bg-surface-container-highest px-md py-xs rounded-full text-label-sm text-on-surface-variant">오늘</span>
</div>
<!-- Partner Message Group -->
<div class="flex flex-col gap-xs max-w-[80%] items-start">
<div class="bg-surface-container-low text-on-surface p-md rounded-[18px] message-bubble-partner shadow-sm transition-all duration-300">
<p class="font-body-md text-body-md">Look at what I found for our garden!</p>
</div>
<div class="w-full aspect-square rounded-[18px] overflow-hidden mb-xs shadow-md">
<img alt="Garden Idea" class="w-full h-full object-cover" data-alt="A lush, intimate garden corner featuring terracotta pots filled with vibrant flowering plants and soft green ferns. The lighting is golden-hour sunlight filtering through leaves, creating a peaceful, misty atmosphere. The color palette emphasizes deep greens and earthy tones, maintaining a high-end, tactile softness consistent with a digital sanctuary for couples." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkj06UKqq6-BmDuDhb8W_1lpmmJedtPBsTQjFWMT56bDN40-iNUobroVv0-qJbx1DB_zCHCAxm5S23sdWDRxErYwbWZJJqMIY4e0RU3VCGe1b5uN1DGHOXXvsZt4muvw7OtabcWHnyRinaVRfDnm-LDca6AxgLIJPn54VHFlOCzk72X-fYGopeWiAYGk_CYvd5ftNQ5yKL6Jf0lDIPHSOu6bYcVfJjrokUd4nI0DUkzFS2giGkXd-VWB4ckNrb5TdChxv1qSDI4PwT"/>
</div>
<span class="text-[10px] text-on-surface-variant ml-sm">11:30 AM</span>
</div>
<!-- Spacer for input area visibility -->
<div class="h-20"></div>
</main>
<!-- Bottom Input Area -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-low/80 backdrop-blur-md pt-sm pb-lg px-margin-mobile flex items-end gap-md shadow-sm">
<button class="bg-surface-container rounded-full p-md text-secondary hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined">add_photo_alternate</span>
</button>
<div class="flex-1 relative">
<textarea class="w-full bg-surface-container border-none rounded-[24px] px-lg py-md focus:ring-2 focus:ring-primary-container font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 resize-none overflow-hidden max-h-32 transition-all" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
</div>
<button class="bg-primary-container text-on-primary-container rounded-full p-md shadow-md hover:bg-primary transition-all active:scale-90 flex items-center justify-center" id="sendBtn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</footer>
<!-- Bottom Navigation Bar (Hidden on chat detail focus as per UX rules) -->
<!-- Suppressed to prioritize the chat canvas as it's a focused task-page -->
<script>
        // Auto-growing textarea logic
        const tx = document.getElementById('chatInput');
        tx.addEventListener("input", OnInput, false);

        function OnInput() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        }

        // Micro-interaction for the send button
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.addEventListener('click', () => {
            if (tx.value.trim() !== '') {
                tx.value = '';
                tx.style.height = "auto";
                // Animation logic would go here
            }
        });

        // Scroll to bottom on load
        window.onload = function() {
            const container = document.querySelector('.chat-container');
            container.scrollTop = container.scrollHeight;
        };
    </script>
</body></html>
