<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d6e7db",
                        "surface-container-highest": "#eae1d4",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#1c1c18",
                        "on-secondary-container": "#57665d",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#c9c6c0",
                        "surface-tint": "#37684d",
                        "primary-container": "#4a7b5f",
                        "outline": "#717972",
                        "on-secondary-fixed-variant": "#3b4a41",
                        "surface-dim": "#e2d9cc",
                        "on-primary-container": "#dcffe7",
                        "inverse-on-surface": "#f9efe2",
                        "error-container": "#ffdad6",
                        "secondary-container": "#d3e4d8",
                        "background": "#fff8f2",
                        "error": "#ba1a1a",
                        "surface-container": "#f6eddf",
                        "on-secondary-fixed": "#101e17",
                        "on-tertiary-container": "#f9f6ef",
                        "surface-variant": "#eae1d4",
                        "on-primary": "#ffffff",
                        "secondary": "#526259",
                        "surface": "#fff8f2",
                        "secondary-fixed-dim": "#bacbbf",
                        "tertiary-fixed": "#e5e2db",
                        "surface-bright": "#fff8f2",
                        "tertiary-container": "#72716b",
                        "outline-variant": "#c0c9c1",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1f1b13",
                        "on-surface-variant": "#414943",
                        "primary-fixed": "#b9efcd",
                        "surface-container-high": "#f0e7da",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1f1b13",
                        "inverse-primary": "#9ed2b1",
                        "primary": "#316248",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#9ed2b1",
                        "surface-container-low": "#fcf2e5",
                        "on-primary-fixed": "#002112",
                        "on-primary-fixed-variant": "#1e5037",
                        "inverse-surface": "#343027",
                        "on-tertiary-fixed-variant": "#474742",
                        "tertiary": "#595953"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "xs": "4px",
                        "lg": "24px",
                        "xxl": "48px",
                        "margin-mobile": "20px",
                        "sm": "8px",
                        "margin-desktop": "40px",
                        "md": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #EEE9DC;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pin-dot {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .key-tap:active {
            transform: scale(0.92);
            background-color: #E2DCC9 !important;
        }
        .blur-overlay {
            backdrop-filter: blur(8px);
            background: rgba(238, 233, 220, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col items-center justify-between min-h-screen py-xxl px-margin-mobile select-none">
<!-- Header Section -->
<header class="flex flex-col items-center text-center animate-in fade-in slide-in-from-top duration-700">
<div class="mb-sm text-primary">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Tether</h1>
<p class="font-label-md text-label-md text-secondary mt-xs opacity-80">우리만의 공간</p>
</header>
<!-- PIN Display Section -->
<main class="flex flex-col items-center w-full gap-xxl">
<div class="flex gap-md justify-center items-center" id="pin-container">
<!-- 4 Dots for PIN -->
<div class="pin-dot w-4 h-4 rounded-full border-2 border-[#C8C4B8]" data-index="0"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-[#C8C4B8]" data-index="1"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-[#C8C4B8]" data-index="2"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-[#C8C4B8]" data-index="3"></div>
</div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-md w-full max-w-[280px]">
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('1')">1</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('2')">2</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('3')">3</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('4')">4</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('5')">5</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('6')">6</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('7')">7</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('8')">8</button>
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('9')">9</button>
<div class="h-16 w-full"></div> <!-- Empty spacer -->
<button class="key-tap h-16 w-full rounded-xl bg-[#F5F2EB] shadow-sm flex items-center justify-center text-headline-md font-headline-md text-on-surface" onclick="addDigit('0')">0</button>
<button class="key-tap h-16 w-full rounded-xl bg-transparent flex items-center justify-center text-on-surface-variant" onclick="removeDigit()">
<span class="material-symbols-outlined text-headline-md">backspace</span>
</button>
</div>
</main>
<!-- Footer Action -->
<footer class="w-full flex justify-center pb-md">
<button class="flex items-center gap-xs px-lg py-md text-secondary hover:text-primary transition-colors duration-300 font-label-md text-label-md" onclick="triggerBiometric()">
<span class="material-symbols-outlined text-md">fingerprint</span>
            지문으로 잠금해제
        </button>
</footer>
<!-- Atmosphere Background Element -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[10%] left-[10%] w-64 h-64 bg-primary-container blur-[100px] rounded-full"></div>
<div class="absolute bottom-[20%] right-[10%] w-80 h-80 bg-secondary-container blur-[120px] rounded-full"></div>
</div>
<script>
        let currentPin = "";
        const MAX_PIN_LENGTH = 4;
        const dots = document.querySelectorAll('.pin-dot');

        function updateDisplay() {
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('bg-primary', 'border-primary', 'scale-110');
                    dot.classList.remove('border-[#C8C4B8]');
                } else {
                    dot.classList.remove('bg-primary', 'border-primary', 'scale-110');
                    dot.classList.add('border-[#C8C4B8]');
                }
            });
        }

        function addDigit(digit) {
            if (currentPin.length < MAX_PIN_LENGTH) {
                currentPin += digit;
                updateDisplay();
                
                if (currentPin.length === MAX_PIN_LENGTH) {
                    // Logic for "verification"
                    setTimeout(() => {
                        if (currentPin === "1234") { // Demo code
                            document.body.style.opacity = "0";
                            document.body.style.transition = "opacity 0.5s ease-out";
                        } else {
                            // Shake effect on error
                            const container = document.getElementById('pin-container');
                            container.classList.add('animate-bounce');
                            setTimeout(() => {
                                container.classList.remove('animate-bounce');
                                currentPin = "";
                                updateDisplay();
                            }, 400);
                        }
                    }, 300);
                }
            }
        }

        function removeDigit() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDisplay();
            }
        }

        function triggerBiometric() {
            // Visual feedback for interaction
            console.log("Requesting Biometric Unlock...");
            const footerBtn = document.querySelector('footer button');
            footerBtn.classList.add('scale-95');
            setTimeout(() => footerBtn.classList.remove('scale-95'), 150);
        }

        // Add subtle haptic simulation via click feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
</body></html>
