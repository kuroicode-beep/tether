<body class="min-h-screen text-on-surface pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface flex justify-between items-center px-margin-mobile py-sm z-50">
<h1 class="font-headline-md text-headline-md font-semibold text-primary">Tether</h1>
<div class="flex items-center gap-md">
<button class="p-xs hover:bg-surface-container transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined text-primary">settings</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-margin-mobile space-y-lg pt-lg">
<!-- Status Section -->
<section class="grid grid-cols-2 gap-gutter">
<!-- My Card -->
<div class="bg-[#F5F2EB] rounded-xl p-md shadow-sm border-2 border-primary-container flex flex-col items-center text-center space-y-sm">
<div class="flex items-center gap-xs">
<span class="font-label-md text-label-md text-on-surface">나</span>
<div class="w-2 h-2 rounded-full bg-primary"></div>
</div>
<div class="flex justify-around w-full py-xs">
<button class="text-xl mood-active p-xs">😊</button>
<button class="text-xl p-xs grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all">😐</button>
<button class="text-xl p-xs grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all">😴</button>
</div>
<div class="flex flex-wrap justify-center gap-xs">
<span class="px-sm py-1 bg-primary/10 text-primary font-label-sm text-[10px] rounded-full">설렘</span>
<span class="px-sm py-1 bg-surface-variant text-on-surface-variant font-label-sm text-[10px] rounded-full">평온</span>
</div>
<p class="font-body-md text-label-md text-on-surface-variant leading-tight h-10 flex items-center">오늘 하루도 고마워!</p>
<span class="font-label-sm text-[10px] text-outline-variant">방금 전</span>
</div>
<!-- Partner Card -->
<div class="bg-[#F5F2EB] rounded-xl p-md shadow-sm flex flex-col items-center text-center space-y-sm border border-transparent">
<div class="flex items-center gap-xs">
<span class="font-label-md text-label-md text-on-surface">자기</span>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<div class="flex justify-around w-full py-xs">
<div class="text-xl p-xs grayscale-0">😴</div>
</div>
<div class="flex flex-wrap justify-center gap-xs">
<span class="px-sm py-1 bg-secondary-container text-secondary font-label-sm text-[10px] rounded-full">힘듦</span>
<span class="px-sm py-1 bg-surface-variant text-on-surface-variant font-label-sm text-[10px] rounded-full">보고싶어</span>
</div>
<p class="font-body-md text-label-md text-on-surface-variant leading-tight h-10 flex items-center">졸려... 빨리 집 가고 싶다</p>
<span class="font-label-sm text-[10px] text-outline-variant">15분 전</span>
</div>
</section>
<!-- Visual Anchor / Tether Line -->
<div class="py-sm">
<div class="h-1 w-full bg-gradient-to-r from-primary to-primary-container rounded-full opacity-30"></div>
</div>
<!-- Quick Nav Grid -->
<section class="bg-[#F5F2EB] rounded-xl p-lg shadow-sm">
<div class="grid grid-cols-3 gap-y-xl gap-x-gutter">
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-2xl bg-secondary-container flex items-center justify-center group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">chat</span>
</div>
<span class="font-label-md text-label-md text-on-surface">채팅</span>
</button>
<button class="flex flex-col items-center gap-xs group">

</div>
<span class="font-label-md text-label-md text-on-surface">교환일기</span>

<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-2xl bg-secondary-container flex items-center justify-center group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">featured_play_list</span>
</div>
<span class="font-label-md text-label-md text-on-surface">컨텐츠</span>
</button>
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-2xl bg-secondary-container flex items-center justify-center group-hover:scale-105 transition-transform">

<button class="flex flex-col items-center gap-xs group">

<div class="relative z-10">
<p class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-xs">Today's memory</p>

<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-md py-xs scale-95 active:transition-transform duration-150" href="#">

</a>
<!-- More -->

<span class="material-symbols-outlined">more_horiz</span>
<span class="font-label-sm text-label-sm">More</span>
</a>
</nav>
<script>
        // Micro-interactions for mood selection
        const moodButtons = document.querySelectorAll('button.text-xl');
        moodButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Only for "My" card buttons (the first container)
                if (this.closest('.border-primary-container')) {
                    moodButtons.forEach(b => {
                        if (b.closest('.border-primary-container')) {
                            b.classList.remove('mood-active', 'grayscale-0', 'opacity-100');
                            b.classList.add('grayscale', 'opacity-50');
                        }
                    });
                    this.classList.add('mood-active', 'grayscale-0', 'opacity-100');
                    this.classList.remove('grayscale', 'opacity-50');
                }
            });
        });
    </script>
</body></html>
